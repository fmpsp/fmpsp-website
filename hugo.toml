baseURL = "https://blog.fmpsp.com/"
locale = 'en-us'
title = 'Blogs: From My Personal Selection Of Perspectives'
theme = "shibui"
 
[params.author]
  name = "fmpsp"
  email = "scanscuri@gmail.com"
 
[params]
  
  # Enable/disable comments on posts (default: true)
  comments = true

  # Default table of contents visibility per page (default: true)
  # Can be overridden per-page with `toc: false` in front matter
  showtoc = true

  # Show estimated reading time on posts (default: true)
  showreadingtime = true

  # Show last modified date on posts (default: false)
  showlastmod = false

  # Social links (optional)
  twitterHandle = "scuriportable"
  ogImage = "/images/og-image.jpg"

[markup]
  defaultMarkdownHandler = "goldmark"
  # By default, Goldmark trims unsafe outputs which might prevent some shortcodes from rendering.
  # It is recommended to set markup.goldmark.renderer.unsafe=true if you encounter problems.
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # Enable user to embed HTML snippets in Markdown content.
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = true
    tabWidth = 4
    style = "algol_nu"
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = true

[menu]
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 2

[services]
  [services.disqus]
    shortname = 'blog-fmpsp'